<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBK - Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Boogaloo&display=swap');

:root {
  --yellow: #FED90F;
  --blue: #1A8FD1;
  --orange: #F77F00;
  --white: #FFF9E6;
  --outline: #1a1a1a;
  --sky: #87CEEB;
  --grass: #3A7A3A;
  --donut-pink: #FF69B4;
  --skin-tone: #8D5524; /* Black Simpsons Character Skin Tone */
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  font-family: 'Boogaloo', cursive;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* 1080x1350 Instagram Portrait Frame */
#insta-frame {
  width: 432px; /* Scaled down for desktop preview, 1080/2.5 */
  height: 540px; /* Scaled down for desktop preview, 1350/2.5 */
  background: var(--sky);
  position: relative;
  overflow: hidden;
  border: 4px solid #333;
  box-shadow: 0 0 100px rgba(0,0,0,0.8);
}

/* Clouds */
.cloud {
  position: absolute;
  background: white;
  border-radius: 50px;
  opacity: 0.9;
  animation: drift linear infinite;
}
.cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
.cloud:nth-child(1) { width: 60px; height: 20px; top: 10%; left: -80px; animation-duration: 25s; }
.cloud:nth-child(1)::before { width: 30px; height: 30px; top: -15px; left: 8px; }
.cloud:nth-child(1)::after { width: 22px; height: 22px; top: -10px; left: 25px; }

@keyframes drift {
  from { transform: translateX(-100px); }
  to { transform: translateX(550px); }
}

/* SUN */
.sun {
  position: absolute;
  top: 25px;
  right: 35px;
  width: 45px;
  height: 45px;
  background: var(--yellow);
  border-radius: 50%;
  border: 3px solid var(--outline);
  box-shadow: 0 0 20px rgba(254,217,15,0.4);
}

/* TITLE */
.title {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Permanent Marker', cursive;
  font-size: 2.8rem;
  color: var(--yellow);
  -webkit-text-stroke: 2px var(--outline);
  text-shadow: 4px 4px 0 var(--orange), 6px 6px 0 var(--outline);
  z-index: 50;
  letter-spacing: 4px;
}

/* ARTIST (Black Simpsons Style) */
#artist {
  position: absolute;
  bottom: 110px;
  left: 40px;
  width: 70px;
  height: 120px;
  z-index: 20;
  transform-origin: bottom center;
}
#artist .hair {
  width: 50px; height: 30px; background: #000;
  border-radius: 25px 25px 0 0; border: 3px solid var(--outline);
  position: absolute; top: -12px; left: 10px;
}
#artist .head {
  width: 45px; height: 50px; background: var(--skin-tone);
  border: 3px solid var(--outline); border-radius: 20px 20px 15px 15px;
  position: absolute; top: 5px; left: 12px;
}
#artist .eyes { position: absolute; top: 18px; left: 10px; display: flex; gap: 5px; }
.eye { width: 12px; height: 12px; background: white; border-radius: 50%; border: 2px solid var(--outline); position: relative; }
.eye::after { content: ''; position: absolute; width: 4px; height: 4px; background: black; border-radius: 50%; top: 2px; left: 2px; }
#artist .hoodie {
  width: 60px; height: 60px; background: #e63946;
  border: 3px solid var(--outline); border-radius: 12px 12px 0 0;
  position: absolute; top: 50px; left: 5px;
}

/* SKATER (Black Simpsons Style) */
#skater {
  position: absolute;
  bottom: 108px;
  right: 30px;
  width: 60px;
  height: 90px;
  z-index: 20;
  animation: skateMove 4s ease-in-out infinite;
}
#skater .head {
  width: 35px; height: 40px; background: var(--skin-tone);
  border: 3px solid var(--outline); border-radius: 10px;
  position: absolute; top: 0; right: 10px;
}
#skater .hair {
  width: 40px; height: 15px; background: #000;
  border: 2px solid var(--outline); position: absolute; top: -8px; right: 8px;
  clip-path: polygon(0% 100%, 15% 0%, 30% 100%, 45% 0%, 60% 100%, 75% 0%, 90% 100%, 100% 0%, 100% 100%);
}
#skater .board {
  width: 70px; height: 8px; background: #222;
  border: 2px solid var(--outline); border-radius: 4px;
  position: absolute; bottom: 0; right: -5px;
}
@keyframes skateMove {
  0%, 100% { transform: translateX(0) rotate(0); }
  50% { transform: translateX(-20px) rotate(-5deg); }
}

/* Skyline */
.skyline {
  position: absolute; bottom: 100px; left: 0; right: 0;
  height: 90px; display: flex; align-items: flex-end; justify-content: center; gap: 3px;
  z-index: 5; opacity: 0.6; pointer-events: none;
}
.building { background: #2a4a6b; border: 2px solid var(--outline); border-bottom: none; }

/* GROUND & ROAD */
.ground { width: 100%; height: 100px; background: var(--grass); border-top: 3px solid var(--outline); position: absolute; bottom: 0; z-index: 8; }
.road { position: absolute; bottom: 0; width: 100%; height: 40px; background: #222; border-top: 3px solid #000; z-index: 9; }
.road::after {
  content: ''; position: absolute; top: 50%; width: 100%; height: 4px;
  background: repeating-linear-gradient(90deg, var(--yellow) 0, var(--yellow) 25px, transparent 25px, transparent 50px);
  transform: translateY(-50%); animation: roadScroll 0.6s linear infinite;
}
@keyframes roadScroll { from { background-position: 0 0; } to { background-position: -50px 0; } }

/* VIZ BARS */
#viz {
  position: absolute; bottom: 40px; left: 0; right: 0; height: 200px;
  display: flex; align-items: flex-end; justify-content: center; gap: 4px; padding: 0 15px; z-index: 15;
}
.bar {
  flex: 1; background: var(--yellow); border: 2px solid var(--outline);
  border-bottom: none; border-radius: 5px 5px 0 0; transition: height 0.05s ease-out;
}

/* CRT SCANLINES & VIGNETTE */
#insta-frame::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.3) 100%);
  pointer-events: none; z-index: 101;
}
#insta-frame::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.05) 1px, rgba(0,0,0,0.05) 2px);
  pointer-events: none; z-index: 102;
}

/* CONTROLS */
#controls {
  position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
  z-index: 200; display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.play-btn {
  font-family: 'Permanent Marker', cursive; font-size: 1.4rem; padding: 12px 30px;
  background: var(--yellow); border: 4px solid var(--outline); border-radius: 15px;
  cursor: pointer; box-shadow: 5px 5px 0 var(--outline);
}
.play-btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--outline); }
#status { color: #fff; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 15px; font-size: 0.8rem; letter-spacing: 1px; }

</style>
</head>
<body>

<div id="insta-frame">
  <div class="cloud"></div>
  <div class="sun"></div>
  <div class="title">EBK</div>
  <div class="skyline" id="skyline"></div>
  <div id="viz"></div>

  <!-- Artist -->
  <div id="artist">
    <div class="hair"></div>
    <div class="head">
      <div class="eyes">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>
    </div>
    <div class="hoodie"></div>
  </div>

  <!-- Skater -->
  <div id="skater">
    <div class="hair"></div>
    <div class="head"></div>
    <div class="board"></div>
  </div>

  <div class="ground"></div>
  <div class="road"></div>

  <div id="controls">
    <button class="play-btn" id="playBtn">▶ PLAY EBK</button>
    <div id="status">READY TO VIBE</div>
  </div>
</div>

<script>
  // Skyline
  const skyline = document.getElementById('skyline');
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div');
    b.className = 'building';
    b.style.width = (25 + Math.random() * 20) + 'px';
    b.style.height = (40 + Math.random() * 50) + 'px';
    skyline.appendChild(b);
  }

  // Viz Bars
  const viz = document.getElementById('viz');
  const bars = [];
  const BAR_COUNT = 24;
  for (let i = 0; i < BAR_COUNT; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    const t = i / BAR_COUNT;
    if (t < 0.4) bar.style.background = '#FED90F';
    else if (t < 0.7) bar.style.background = '#F77F00';
    else bar.style.background = '#FF4400';
    viz.appendChild(bar);
    bars.push(bar);
  }

  // Audio Context
  let audioCtx, analyser, source, audioBuffer, isPlaying = false, animFrame;
  const playBtn = document.getElementById('playBtn');
  const statusEl = document.getElementById('status');
  const artist = document.getElementById('artist');

  async function initAudio() {
    try {
      const response = await fetch('ebk.m4a');
      const arrayBuffer = await response.arrayBuffer();
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      statusEl.textContent = 'EBK - LOADED';
    } catch (e) {
      statusEl.textContent = 'ERROR LOADING AUDIO';
    }
  }
  initAudio();

  playBtn.addEventListener('click', () => {
    if (!audioBuffer) return;
    if (isPlaying) {
      source.stop();
      isPlaying = false;
      playBtn.textContent = '▶ PLAY EBK';
      cancelAnimationFrame(animFrame);
      bars.forEach(b => b.style.height = '4px');
      return;
    }
    startAudio();
  });

  function startAudio() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    source.start();
    isPlaying = true;
    playBtn.textContent = '⏹ STOP';
    animate();
  }

  const data = new Uint8Array(32);
  function animate() {
    animFrame = requestAnimationFrame(animate);
    analyser.getByteFrequencyData(data);
    let bass = 0;
    for (let i = 0; i < BAR_COUNT; i++) {
      const v = data[i % 16];
      bars[i].style.height = Math.max(4, (v / 255) * 200) + 'px';
      if (i < 4) bass += v;
    }
    const bassLevel = bass / (4 * 255);
    artist.style.transform = `scaleY(${1 + bassLevel * 0.3}) translateY(${-bassLevel * 30}px)`;
  }
</script>

</body>
</html>
