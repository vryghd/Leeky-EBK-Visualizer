<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EBK - Simpsons Visualizer (p5.js)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Boogaloo&display=swap');
    body {
      margin: 0;
      padding: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #p5-container {
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      /* Use a pure CSS border here or inside the canvas later */
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>
<body>
<div id="p5-container"></div>
<script>
  // -- ASSETS & SOUND --
  let song;
  let amplitude;
  
  // -- COLORS --
  const SIMPSONS_BLUE = '#7092BE';
  const SKIN_YELLOW = '#FED90F';
  const OUTLINE = '#000000';
  
  // -- ANIMATION STATE --
  let clouds = [];
  let roadOffset = 0;
  let bldgOffset = 0; // Buildings scroll slower than road
  let carBounce = 0;
  
  // -- AUDIO SYNC --
  let isFiring = false;
  let flashTimer = 0;

  function setup() {
    let canvasWidth = (windowHeight * (9/16)) * 0.95; 
    let canvasHeight = windowHeight * 0.95;
    
    // Fallback if calculated height is too small
    if (canvasHeight < 540) {
      canvasHeight = 540;
      canvasWidth = 432;
    }

    let cnv = createCanvas(canvasWidth, canvasHeight);
    cnv.parent('p5-container');
    
    // Initialize Amplitude Analyzer
    amplitude = new p5.Amplitude();
    
    // Create initial clouds
    for(let i=0; i<8; i++) {
      clouds.push({
        x: random(width),
        y: random(height * 0.05, height * 0.4),
        speed: random(0.2, 1.0),
        scale: random(0.6, 1.5)
      });
    }

    // Load sound asynchronously AFTER setup starts so we don't block the "Loading..." screen
    soundFormats('m4a', 'mp3');
    song = loadSound('Leeky EBK.m4a', soundLoaded, soundFailed);
  }

  function soundLoaded() {
    console.log("Audio Loaded Successfully!");
    // Attempt auto-play when loaded, but if blocked, user can click.
    getAudioContext().resume().then(() => {
      song.loop();
    }).catch(e => console.log("Autoplay blocked setup:", e));
  }

  function soundFailed(err) {
    console.error("Failed to load audio file", err);
  }


  function draw() {
    // Gradient Sky
    setGradient(0, 0, width, height*0.66, color('#4FA6FF'), color('#87CEEB'));
    
    // Ensure audio plays if user interacts anywhere in case autoplay blocked
    if (song && song.isLoaded() && !song.isPlaying() && getAudioContext().state === 'running') {
         song.loop();
    }

    // Read audio level safely
    let level = 0;
    if (song && song.isPlaying()) {
       level = amplitude.getLevel();
    }
    
    // Beat detection logic (simple threshold)
    if (level > 0.3 && flashTimer <= 0) {
      isFiring = true;
      flashTimer = 5; // Frames to show flash
    }
    
    if (flashTimer > 0) {
      flashTimer--;
    } else {
      isFiring = false;
    }

    // UPDATE VARIABLES
    roadOffset += 10; 
    if (roadOffset > 80) roadOffset = 0; // Loop road lines
    
    bldgOffset += 3; // Parallax building scroll
    if (bldgOffset >= 600) bldgOffset = 0; // Reset based on combined width

    // Car bounce based on frameCount
    carBounce = sin(frameCount * 0.5) * 3;
    
    // Global Shakes when firing
    push();
    if (isFiring) {
        let shakeAmt = map(level, 0.3, 1.0, 2, 8);
        translate(random(-shakeAmt, shakeAmt), random(-shakeAmt, shakeAmt));
    }

    // DRAW SCENE LAYERS
    drawClouds();
    
    push();
    translate(-bldgOffset, 0); // pan buildings left
    drawBackgroundScene();
    translate(600, 0); // draw duplicate to stitch edge
    drawBackgroundScene();
    pop();

    drawRoad();
    
    drawCharacters();
    drawCars();
    
    if (isFiring) {
      drawMuzzleFlashes();
    }
    
    pop(); // End Global Shake
    
    drawText(level);
    drawCRT();
    
    // Border
    strokeWeight(8);
    stroke(0);
    noFill();
    rect(0, 0, width, height);
  }

  function setGradient(x, y, w, h, c1, c2) {
    noFill();
    for (let i = y; i <= y + h; i++) {
      let inter = map(i, y, y + h, 0, 1);
      let c = lerpColor(c1, c2, inter);
      stroke(c);
      line(x, i, x + w, i);
    }
  }
  function windowResized() {
    let canvasWidth = (windowHeight * (9/16)) * 0.95; 
    let canvasHeight = windowHeight * 0.95;
    if (canvasHeight < 540) {
      canvasHeight = 540;
      canvasWidth = 432;
    }
    resizeCanvas(canvasWidth, canvasHeight);
  }

  // Force unlock audio context on any click to guarantee playback if browser blocks
  function mousePressed() {
    if (getAudioContext().state !== 'running') {
      getAudioContext().resume();
    }
    if (song && song.isLoaded() && !song.isPlaying()) {
      song.loop();
    }
  }

  function drawClouds() {
    for (let i = 0; i < clouds.length; i++) {
        let c = clouds[i];
        
        push();
        translate(c.x, c.y);
        scale(c.scale);
        
        // Shadow offset
        noStroke(); fill(0, 30);
        ellipse(4, 4, 100, 35); ellipse(-11, -11, 50, 50); ellipse(24, -6, 40, 40);

        strokeWeight(3);
        stroke(OUTLINE);
        fill(255);
        
        // Base cloud ellipse
        ellipse(0, 0, 100, 35);
        ellipse(-15, -15, 50, 50);
        ellipse(20, -10, 40, 40);
        
        // Minor inner detail lines
        strokeWeight(1.5); stroke(200); noFill();
        arc(-15, -15, 30, 30, PI, TWO_PI-0.5);
        
        pop();
        
        c.x += c.speed;
        if (c.x > width + 100) {
            c.x = -100;
            c.y = random(height * 0.05, height * 0.4);
        }
    }
  }

  function drawBackgroundScene() {
    let roadY = height * 0.66; // Buildings sit exactly here
    
    // Leeky's Tavern
    let tX = 20;
    push();
    translate(tX, roadY - 130);
    fill('#E48257'); // Building color
    strokeWeight(4);
    stroke(OUTLINE);
    rect(0, 0, 180, 130);
    
    // Tavern Roof (Green)
    fill('#4A7A59');
    rect(-5, -15, 190, 15);
    
    // Tavern Windows
    fill('#87CEEB');
    rect(20, 30, 50, 50);
    strokeWeight(3);
    line(45, 30, 45, 80); // Vert pane
    line(20, 55, 70, 55); // Horiz pane
    
    // Tavern Sign
    push();
    translate(120, -10);
    rotate(radians(-5));
    fill('#50312F'); // sign bg
    rect(0, 0, 70, 40);
    noStroke();
    fill('#F2C14E');
    textFont('Permanent Marker', 11);
    textAlign(CENTER, CENTER);
    text("LEEKY'S", 35, 12);
    text("TAVERN", 35, 26);
    pop();
    pop();

    // Kwik-E-Mart
    let kX = 280;
    push();
    translate(kX, roadY - 130);
    fill('#EEDC9A'); 
    strokeWeight(4);
    stroke(OUTLINE);
    rect(0, 0, 240, 130);
    
    // Roof/Base trims
    fill('#2ECC71'); rect(-5, -25, 250, 25); // Green Roof
    fill('#D35400'); rect(-5, 110, 250, 20); // Orange base

    // Big front glass
    fill('#87CEEB');
    rect(15, 15, 210, 50);
    line(70, 15, 70, 65);
    line(120, 15, 120, 65);
    line(170, 15, 170, 65);

    // Kwik E Mart Logo
    fill(255);
    stroke('#D35400'); // Red/Orange outer border
    strokeWeight(4);
    rect(50, -65, 140, 30, 8); // x, y, w, h, radius
    
    // Support pole
    fill(150); stroke(OUTLINE); strokeWeight(3);
    rect(115, -35, 10, 10);

    noStroke();
    fill('#2ECC71');
    textFont('Permanent Marker', 15);
    textAlign(CENTER, CENTER);
    text("KWIK-E-MART", 120, -50);
    pop();

    // The gap in bldgOffset wrap logic expects approx 600 total width.
    // 20+180 + gap + 280+240 = roughly 550 bounds. 600 loop works.
  }

  function drawRoad() {
    let roadY = height * 0.66;
    let roadH = height * 0.34;
    
    push();
    strokeWeight(5);
    stroke(OUTLINE);
    fill(51); // Dark grey asphalt
    rect(-10, roadY, width + 20, roadH + 10);
    
    // Center Dashed line (loops based on roadOffset)
    noStroke();
    fill(SKIN_YELLOW);
    for(let x = -80 + roadOffset; x < width + 80; x += 80) {
      rect(x, roadY + roadH/2 - 4, 40, 8);
    }
    pop();
  }

  function drawCars() {
    let roadY = height * 0.66;
    
    // Purple Sedan
    drawDetailedCar(width * 0.1, roadY + 40 + carBounce, '#9b59b6', false);
    
    // Green Sedan (Mirrored visually)
    drawDetailedCar(width * 0.6, roadY + 60 + carBounce, '#27ae60', true);
  }

  function drawDetailedCar(x, y, colorCode, isMirrored) {
    push();
    translate(x, y);
    if (isMirrored) {
       translate(160, 0); 
       scale(-1, 1);
    }
    
    // Shadow under car
    noStroke(); fill(0, 80);
    ellipse(80, 60, 160, 20);

    strokeWeight(4); stroke(OUTLINE);
    fill(colorCode);
    
    // Cabin
    rect(30, -35, 80, 40, 30, 30, 0, 0); 
    // Body
    rect(0, 0, 160, 50, 15, 30, 10, 10);
    
    // Door Lines & Details
    strokeWeight(2);
    line(70, 0, 70, 40); // Front door seam
    line(110, 0, 110, 40); // Back door seam
    fill(0); circle(60, 15, 6); circle(100, 15, 6); // Door handles

    // Windows & Reflection
    strokeWeight(4); fill('#87CEEB');
    rect(40, -28, 60, 30, 15, 15, 0, 0);
    line(70, -28, 70, 2); // Split
    // Glass reflection
    strokeWeight(2); stroke(255, 150);
    line(45, -20, 55, -20); line(48, -15, 52, -15);
    line(75, -20, 85, -20);
    
    // Bumpers / Headlights / Taillights
    strokeWeight(4); stroke(OUTLINE);
    fill('#CCCCCC');
    rect(-5, 30, 15, 15, 5); // Rear Bumper
    rect(150, 30, 15, 15, 5); // Front Bumper
    
    fill('#FF3333'); // Taillight
    rect(0, 10, 10, 15, 2);
    fill('#FFFF99'); // Headlight
    rect(145, 10, 15, 15, 5);

    // Wheels
    fill(0);
    circle(35, 50, 35); // back
    circle(125, 50, 35); // front
    
    // Hubcaps & Details
    fill(180);
    circle(35, 50, 15);
    circle(125, 50, 15);
    fill(0); circle(35, 50, 4); circle(125, 50, 4);
    
    pop();
  }

  function drawCharacters() {
    let roadY = height * 0.66;
    
    // Left Character
    drawDetailedChar(width * 0.1 - 10, roadY + 20 + carBounce, false);
    // Right Character
    drawDetailedChar(width * 0.6 + 180, roadY + 40 + carBounce, true);
  }

  function drawDetailedChar(x, y, isMirrored) {
    push();
    translate(x, y);
    if(isMirrored) scale(-1, 1);

    strokeWeight(4);
    stroke(OUTLINE);
    
    // Stick Body/Legs
    line(0, 0, 0, 40); // Torso
    line(0, 40, -15, 70); // Leg L
    line(0, 40, 15, 70); // Leg R
    
    // Arm Holding Gun
    line(0, 15, 45, 0);
    fill(SKIN_YELLOW); circle(45, 0, 12); // Hand

    // Head (Simpsons elongated shape)
    fill(SKIN_YELLOW);
    beginShape();
    vertex(-10, 15);
    bezierVertex(-20, -5, -15, -20, 0, -20);
    bezierVertex(15, -20, 20, -5, 10, 15);
    endShape(CLOSE);
    
    // Mouth
    noFill(); stroke(OUTLINE); strokeWeight(2);
    arc(5, 5, 10, 10, 0, PI);

    // Eyes
    strokeWeight(3);
    fill(255); circle(-5, -5, 12); circle(5, -5, 12); // Slightly larger bulbous eyes
    fill(0); circle(-5, -5, 4); circle(5, -5, 4); // Pupils
    
    // Nose
    noFill(); stroke(OUTLINE); strokeWeight(2);
    arc(10, 0, 8, 8, -HALF_PI, HALF_PI);

    // Pistol
    push();
    fill('#222'); translate(48, -2); rotate(radians(-15));
    strokeWeight(3);
    // Gun Barrel & Handle
    beginShape();
    vertex(0,0); vertex(20,0); vertex(20,-6); vertex(3,-6); 
    vertex(3,-14); vertex(-4,-14); vertex(-4, 0); 
    endShape(CLOSE);
    // Detail
    strokeWeight(1); stroke(100); line(5, -3, 15, -3);
    pop();
    
    pop();
  }

  function drawMuzzleFlashes() {
    let roadY = height * 0.66;
    
    strokeWeight(3);
    stroke(OUTLINE);
    fill(SKIN_YELLOW);

    // Flash for Left Char
    push();
    translate(width * 0.1 + 45, roadY + 20 + carBounce);
    drawStar(0, -6, 10, 25, 5); 
    pop();

    // Flash for Right Char
    push();
    translate(width * 0.6 + 120, roadY + 40 + carBounce);
    drawStar(0, -6, 10, 25, 5);
    pop();
  }

  // Helper for drawing star shapes
  function drawStar(x, y, radius1, radius2, npoints) {
    let angle = TWO_PI / npoints;
    let halfAngle = angle / 2.0;
    beginShape();
    for (let a = 0; a < TWO_PI; a += angle) {
      let sx = x + cos(a) * radius2;
      let sy = y + sin(a) * radius2;
      vertex(sx, sy);
      sx = x + cos(a + halfAngle) * radius1;
      sy = y + sin(a + halfAngle) * radius1;
      vertex(sx, sy);
    }
    endShape(CLOSE);
  }

  function drawText(level) {
    push();
    let pulseScale = map(level, 0, 1, 1.0, 1.5);
    
    translate(width/2, height * 0.15);
    scale(pulseScale);
    
    textFont('Permanent Marker');
    textAlign(CENTER, CENTER);
    textSize(80);
    
    // Draw Thick Stroke
    stroke(OUTLINE);
    strokeWeight(15);
    fill('#F77F00'); // Orange fallback if gradient fail
    
    // Simple Gradient fill simulation by drawing twice slightly offset
    text("EBK", 0, 0);
    noStroke();
    fill(SKIN_YELLOW);
    text("EBK", 0, -4); // Yellow inner top
    pop();
  }

  function drawCRT() {
    push();
    // 20% opacity dark lines
    stroke(0, 51); // 0.2 opacity approx 51 out of 255
    strokeWeight(1.5);
    // Draw lines horizontally across
    for(let y = 0; y < height; y += 4) {
      line(0, y, width, y);
    }
    pop();
  }

</script>
</body>
</html>
