<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EBK - Simpsons Visualizer (p5.js)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Boogaloo&display=swap');
    body {
      margin: 0;
      padding: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #p5-container {
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      /* Use a pure CSS border here or inside the canvas later */
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>
<body>
<div id="p5-container"></div>
<script>
  // -- ASSETS & SOUND --
  let song;
  let amplitude;
  let started = false;
  
  // -- COLORS --
  const SIMPSONS_BLUE = '#7092BE';
  const SKIN_YELLOW = '#FED90F';
  const OUTLINE = '#000000';
  
  // -- ANIMATION STATE --
  let clouds = [];
  let roadOffset = 0;
  let bldgOffset = 0; // Buildings scroll slower than road
  let carBounce = 0;
  
  // -- AUDIO SYNC --
  let isFiring = false;
  let flashTimer = 0;

  function preload() {
    // Attempt to load the audio file. Make sure Leeky EBK.m4a exists relative to index.html
    song = loadSound('Leeky EBK.m4a');
  }

  function setup() {
    let canvasWidth = (windowHeight * (9/16)) * 0.95; 
    let canvasHeight = windowHeight * 0.95;
    
    // Fallback if calculated height is too small
    if (canvasHeight < 540) {
      canvasHeight = 540;
      canvasWidth = 432;
    }

    let cnv = createCanvas(canvasWidth, canvasHeight);
    cnv.parent('p5-container');
    
    // Initialize Amplitude Analyzer
    amplitude = new p5.Amplitude();
    
    // Create initial clouds
    for(let i=0; i<6; i++) {
      clouds.push({
        x: random(width),
        y: random(height * 0.05, height * 0.4),
        speed: random(0.5, 1.5),
        scale: random(0.5, 1.2)
      });
    }
  }

  function draw() {
    background(SIMPSONS_BLUE);
    
    if (!started) {
      drawStartScreen();
      return;
    }

    // Read audio level
    let level = amplitude.getLevel();
    
    // Beat detection logic (simple threshold)
    if (level > 0.3 && flashTimer <= 0) {
      isFiring = true;
      flashTimer = 5; // Frames to show flash
    }
    
    if (flashTimer > 0) {
      flashTimer--;
    } else {
      isFiring = false;
    }

    // UPDATE VARIABLES
    roadOffset += 10; 
    if (roadOffset > 80) roadOffset = 0; // Loop road lines
    
    bldgOffset += 3; // Parallax building scroll
    if (bldgOffset >= 600) bldgOffset = 0; // Reset based on combined width

    // Car bounce based on frameCount
    carBounce = sin(frameCount * 0.5) * 3;
    
    // Global Shakes when firing
    push();
    if (isFiring) {
        let shakeAmt = map(level, 0.3, 1.0, 2, 8);
        translate(random(-shakeAmt, shakeAmt), random(-shakeAmt, shakeAmt));
    }

    // DRAW SCENE LAYERS
    drawClouds();
    
    push();
    translate(-bldgOffset, 0); // pan buildings left
    drawBackgroundScene();
    translate(600, 0); // draw duplicate to stitch edge
    drawBackgroundScene();
    pop();

    drawRoad();
    
    drawCharacters();
    drawCars();
    
    if (isFiring) {
      drawMuzzleFlashes();
    }
    
    pop(); // End Global Shake
    
    drawText(level);
    drawCRT();
    
    // Border
    strokeWeight(8);
    stroke(0);
    noFill();
    rect(0, 0, width, height);
  }

  // --- DRAWING FUNCTIONS ---

  function drawStartScreen() {
    fill(0, 150);
    rect(0, 0, width, height);
    
    fill(255);
    noStroke();
    textAlign(CENTER, CENTER);
    textFont('Boogaloo', 36);
    text("CLICK TO START", width/2, height/2);
  }

  function mousePressed() {
    if (!started && getAudioContext().state !== 'running') {
      getAudioContext().resume().then(() => {
        song.loop();
        started = true;
      });
    } else if (!started && song.isLoaded()) {
      song.loop();
      started = true;
    }
  }

  function drawClouds() {
    for (let i = 0; i < clouds.length; i++) {
        let c = clouds[i];
        
        push();
        translate(c.x, c.y);
        scale(c.scale);
        strokeWeight(3);
        stroke(OUTLINE);
        fill(255);
        
        // Base cloud ellipse
        ellipse(0, 0, 100, 35);
        ellipse(-15, -15, 50, 50);
        ellipse(20, -10, 40, 40);
        pop();
        
        c.x += c.speed;
        if (c.x > width + 100) {
            c.x = -100;
            c.y = random(height * 0.05, height * 0.4);
        }
    }
  }

  function drawBackgroundScene() {
    let roadY = height * 0.66; // Buildings sit exactly here
    
    // Leeky's Tavern
    let tX = 20;
    push();
    translate(tX, roadY - 130);
    fill('#E48257'); // Building color
    strokeWeight(4);
    stroke(OUTLINE);
    rect(0, 0, 180, 130);
    
    // Tavern Roof (Green)
    fill('#4A7A59');
    rect(-5, -15, 190, 15);
    
    // Tavern Windows
    fill('#87CEEB');
    rect(20, 30, 50, 50);
    strokeWeight(3);
    line(45, 30, 45, 80); // Vert pane
    line(20, 55, 70, 55); // Horiz pane
    
    // Tavern Sign
    push();
    translate(120, -10);
    rotate(radians(-5));
    fill('#50312F'); // sign bg
    rect(0, 0, 70, 40);
    noStroke();
    fill('#F2C14E');
    textFont('Permanent Marker', 11);
    textAlign(CENTER, CENTER);
    text("LEEKY'S", 35, 12);
    text("TAVERN", 35, 26);
    pop();
    pop();

    // Kwik-E-Mart
    let kX = 280;
    push();
    translate(kX, roadY - 130);
    fill('#EEDC9A'); 
    strokeWeight(4);
    stroke(OUTLINE);
    rect(0, 0, 240, 130);
    
    // Roof/Base trims
    fill('#2ECC71'); rect(-5, -25, 250, 25); // Green Roof
    fill('#D35400'); rect(-5, 110, 250, 20); // Orange base

    // Big front glass
    fill('#87CEEB');
    rect(15, 15, 210, 50);
    line(70, 15, 70, 65);
    line(120, 15, 120, 65);
    line(170, 15, 170, 65);

    // Kwik E Mart Logo
    fill(255);
    stroke('#D35400'); // Red/Orange outer border
    strokeWeight(4);
    rect(50, -65, 140, 30, 8); // x, y, w, h, radius
    
    // Support pole
    fill(150); stroke(OUTLINE); strokeWeight(3);
    rect(115, -35, 10, 10);

    noStroke();
    fill('#2ECC71');
    textFont('Permanent Marker', 15);
    textAlign(CENTER, CENTER);
    text("KWIK-E-MART", 120, -50);
    pop();

    // The gap in bldgOffset wrap logic expects approx 600 total width.
    // 20+180 + gap + 280+240 = roughly 550 bounds. 600 loop works.
  }

  function drawRoad() {
    let roadY = height * 0.66;
    let roadH = height * 0.34;
    
    push();
    strokeWeight(5);
    stroke(OUTLINE);
    fill(51); // Dark grey asphalt
    rect(-10, roadY, width + 20, roadH + 10);
    
    // Center Dashed line (loops based on roadOffset)
    noStroke();
    fill(SKIN_YELLOW);
    for(let x = -80 + roadOffset; x < width + 80; x += 80) {
      rect(x, roadY + roadH/2 - 4, 40, 8);
    }
    pop();
  }

  function drawCars() {
    let roadY = height * 0.66;
    
    // Left Car (Purple)
    push();
    translate(width * 0.1, roadY + 40 + carBounce);
    
    strokeWeight(4); stroke(OUTLINE);
    fill('#9b59b6');
    // Cabin
    rect(30, -35, 80, 40, 30, 30, 0, 0); 
    // Body
    rect(0, 0, 160, 50, 15, 30, 10, 10);
    
    // Window
    fill('#87CEEB');
    rect(40, -28, 60, 30, 15, 15, 0, 0);

    // Wheels
    fill(0);
    circle(35, 50, 35); // back wheel
    circle(125, 50, 35); // front wheel
    
    fill(180); // Hubcaps
    circle(35, 50, 15);
    circle(125, 50, 15);
    pop();

    // Right Car (Green)
    push();
    translate(width * 0.6, roadY + 60 + carBounce);
    
    strokeWeight(4); stroke(OUTLINE);
    fill('#27ae60');
    // Cabin
    rect(40, -35, 80, 40, 30, 30, 0, 0);
    // Body (Mirrored visually in HTML, here we just draw it backwards or use scale)
    // Actually using scale(-1, 1) to mirror it completely
    translate(160, 0); 
    scale(-1, 1);
    
    rect(0, 0, 160, 50, 15, 30, 10, 10);
    
    // Window
    fill('#87CEEB');
    rect(40, -28, 60, 30, 15, 15, 0, 0);

    // Wheels
    fill(0);
    circle(35, 50, 35);
    circle(125, 50, 35);
    
    fill(180); // Hubcaps
    circle(35, 50, 15);
    circle(125, 50, 15);
    pop();
  }

  function drawCharacters() {
    let roadY = height * 0.66;
    
    strokeWeight(4);
    stroke(OUTLINE);
    
    // Left Character
    push();
    // Positioned behind trunk of purple car
    translate(width * 0.1 - 10, roadY + 20 + carBounce); 
    
    // Stick Body/Legs
    line(0, 0, 0, 40); // Torso
    line(0, 40, -15, 70); // Leg L
    line(0, 40, 15, 70); // Leg R
    
    // Head (Yellow fill)
    fill(SKIN_YELLOW);
    circle(0, 0, 30);
    // Eyes
    fill(255); circle(-5, -5, 10); circle(5, -5, 10);
    fill(0); circle(-5, -5, 3); circle(5, -5, 3);

    // Aiming Arm
    line(0, 15, 45, 0);
    
    // Pistol (Black)
    push();
    fill(0); translate(45, 0); rotate(radians(-15));
    beginShape();
    vertex(0,0); vertex(15,0); vertex(15,-6); vertex(3,-6); vertex(3,-10); vertex(-3,-10); vertex(-3, -2); endShape(CLOSE);
    pop();
    pop();

    // Right Character (Mirrored, behind green car hood)
    push();
    translate(width * 0.6 + 180, roadY + 40 + carBounce);
    scale(-1, 1); // Face left
    
    // Stick Body/Legs
    line(0, 0, 0, 40); // Torso
    line(0, 40, -15, 70); // Leg L
    line(0, 40, 15, 70); // Leg R
    
    // Head
    fill(SKIN_YELLOW);
    circle(0, 0, 30);
    fill(255); circle(-5, -5, 10); circle(5, -5, 10);
    fill(0); circle(-5, -5, 3); circle(5, -5, 3);

    // Aiming Arm
    line(0, 15, 45, -5);
    
    // Pistol
    push();
    fill(0); translate(45, -5); rotate(radians(-10));
    beginShape();
    vertex(0,0); vertex(15,0); vertex(15,-6); vertex(3,-6); vertex(3,-10); vertex(-3,-10); vertex(-3, -2); endShape(CLOSE);
    pop();
    pop();
  }

  function drawMuzzleFlashes() {
    let roadY = height * 0.66;
    
    strokeWeight(3);
    stroke(OUTLINE);
    fill(SKIN_YELLOW);

    // Flash for Left Char
    push();
    translate(width * 0.1 + 45, roadY + 20 + carBounce);
    drawStar(0, -6, 10, 25, 5); 
    pop();

    // Flash for Right Char
    push();
    translate(width * 0.6 + 120, roadY + 40 + carBounce);
    drawStar(0, -6, 10, 25, 5);
    pop();
  }

  // Helper for drawing star shapes
  function drawStar(x, y, radius1, radius2, npoints) {
    let angle = TWO_PI / npoints;
    let halfAngle = angle / 2.0;
    beginShape();
    for (let a = 0; a < TWO_PI; a += angle) {
      let sx = x + cos(a) * radius2;
      let sy = y + sin(a) * radius2;
      vertex(sx, sy);
      sx = x + cos(a + halfAngle) * radius1;
      sy = y + sin(a + halfAngle) * radius1;
      vertex(sx, sy);
    }
    endShape(CLOSE);
  }

  function drawText(level) {
    push();
    let pulseScale = map(level, 0, 1, 1.0, 1.5);
    
    translate(width/2, height * 0.15);
    scale(pulseScale);
    
    textFont('Permanent Marker');
    textAlign(CENTER, CENTER);
    textSize(80);
    
    // Draw Thick Stroke
    stroke(OUTLINE);
    strokeWeight(15);
    fill('#F77F00'); // Orange fallback if gradient fail
    
    // Simple Gradient fill simulation by drawing twice slightly offset
    text("EBK", 0, 0);
    noStroke();
    fill(SKIN_YELLOW);
    text("EBK", 0, -4); // Yellow inner top
    pop();
  }

  function drawCRT() {
    push();
    // 20% opacity dark lines
    stroke(0, 51); // 0.2 opacity approx 51 out of 255
    strokeWeight(1.5);
    // Draw lines horizontally across
    for(let y = 0; y < height; y += 4) {
      line(0, y, width, y);
    }
    pop();
  }

  // Handle window resizing cleanly while maintaining ratio
  function windowResized() {
    let canvasWidth = (windowHeight * (9/16)) * 0.95; 
    let canvasHeight = windowHeight * 0.95;
    if (canvasHeight < 540) {
      canvasHeight = 540;
      canvasWidth = 432;
    }
    resizeCanvas(canvasWidth, canvasHeight);
  }
</script>
</body>
</html>
