<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBK - Leeky's Chase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Boogaloo&display=swap');

:root {
  --yellow: #FED90F;
  --blue: #1A8FD1;
  --orange: #F77F00;
  --outline: #000;
  --sky-blue: #4FA6FF;
  --grass: #3A7A3A;
  --skin-tone: #FED90F; /* Classic Simpson Yellow */
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #111;
  font-family: 'Boogaloo', cursive;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#insta-frame {
  width: 432px;
  height: 540px;
  background: var(--sky-blue);
  position: relative;
  overflow: hidden;
  border: 4px solid #000;
  box-shadow: 0 0 50px rgba(0,0,0,0.8);
}

/* SCREEN SHAKE CLASS */
.shake {
  animation: shakeEffect 0.15s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes shakeEffect {
  10%, 90% { transform: translate3d(-2px, -2px, 0); }
  20%, 80% { transform: translate3d(4px, 4px, 0); }
  30%, 50%, 70% { transform: translate3d(-6px, -6px, 0); }
  40%, 60% { transform: translate3d(6px, 6px, 0); }
}

/* SIMPSONS SKY */
.sky {
  position: absolute; inset: 0; height: 60%;
  background: linear-gradient(to bottom, #4FA6FF 0%, #87CEEB 100%);
  z-index: 1;
}
.cloud {
  position: absolute; background: white; border-radius: 100px;
  filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.05));
  animation: drift linear infinite;
}
.cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
.cloud.c1 { width: 100px; height: 35px; top: 10%; left: -150px; animation-duration: 30s; }
.cloud.c1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
.cloud.c1::after { width: 40px; height: 40px; top: -15px; left: 50px; }
@keyframes drift { from { transform: translateX(-200px); } to { transform: translateX(650px); } }

/* BUILDINGS (Moving Background) */
.buildings-container {
  position: absolute; bottom: 160px; width: 200%; height: 180px;
  display: flex; align-items: flex-end; z-index: 5;
  animation: backgroundMove 10s linear infinite;
}
@keyframes backgroundMove { from { transform: translateX(0); } to { transform: translateX(-50%); } }

.building { border: 4px solid var(--outline); position: relative; flex-shrink: 0; margin-right: 100px; }

/* MOE'S TAVERN STYLE */
.moes { 
  width: 180px; height: 130px; 
  background: #E48257; 
  border-top: 15px solid #4A7A59; 
}
.moes::before { 
  content: ''; position: absolute;
  top: 30px; left: 20px; width: 50px; height: 50px;
  background: #87CEEB; border: 4px solid var(--outline);
  background-image: linear-gradient(0deg, transparent 46%, var(--outline) 46%, var(--outline) 54%, transparent 54%), linear-gradient(90deg, transparent 46%, var(--outline) 46%, var(--outline) 54%, transparent 54%);
}
.moes-sign { 
  position: absolute; top: 10px; right: 10px;
  background: #50312F; border: 3px solid var(--outline); padding: 5px;
  font-family: 'Permanent Marker', cursive; font-size: 0.9rem; color: #F2C14E;
  transform: rotate(-3deg); box-shadow: 3px 3px 0 var(--outline); text-align: center; line-height: 1.1;
}

/* LARD LAD STYLE */
.donuts { 
  width: 160px; height: 130px; 
  background: #F3E5AB; 
  border-top: 10px solid #E56B55; 
}
.donuts::before {
  content: "LARD LAD"; position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
  background: white; border: 3px solid var(--outline); padding: 2px 8px;
  font-family: 'Permanent Marker', cursive; font-size: 0.9rem; color: #E56B55; white-space: nowrap;
  border-radius: 10px;
}
.donuts-sign { 
  position: absolute; top: -65px; left: 50%; transform: translateX(-50%);
  width: 36px; height: 36px; border: 16px solid #F472B6; border-radius: 50%;
  box-shadow: 0 0 0 4px var(--outline), inset 0 0 0 4px var(--outline);
}
.donuts-sign::after {
  content: ''; position: absolute;
  width: 4px; height: 4px; background: white; border-radius: 50%;
  top: -8px; left: 0;
  box-shadow: 18px -4px 0 yellow, 30px 8px 0 cyan, -4px 18px 0 lightgreen, 4px 30px 0 white, 30px 30px 0 yellow;
}

/* ROAD */
.road {
  position: absolute; bottom: 0; width: 100%; height: 160px;
  background: #333; border-top: 5px solid var(--outline); z-index: 10;
}
.road-lines {
  position: absolute; top: 50%; width: 100%; height: 8px;
  background: repeating-linear-gradient(90deg, var(--yellow) 0, var(--yellow) 40px, transparent 40px, transparent 80px);
  transform: translateY(-50%);
  animation: roadScroll 0.3s linear infinite;
}
@keyframes roadScroll { from { background-position: 0 0; } to { background-position: -80px 0; } }

/* CARS */
.car {
  position: absolute; bottom: 40px; width: 160px; height: 70px;
  border: 4px solid var(--outline); border-radius: 15px 30px 10px 10px;
  z-index: 20; animation: bounce 0.2s infinite;
}
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }

.car.purple { left: 20px; background: #9b59b6; }
.car.green { right: 20px; background: #27ae60; transform: scaleX(-1); }

.car::before { 
  content: ''; position: absolute; top: -35px; left: 30px; width: 80px; height: 40px;
  background: inherit; border: 4px solid var(--outline); border-radius: 30px 30px 0 0;
}

.window {
  position: absolute; top: -28px; left: 40px; width: 60px; height: 30px;
  background: #87CEEB; border: 3px solid var(--outline); border-radius: 15px 15px 0 0;
  overflow: hidden;
}

/* CHARACTERS */
.character {
  position: absolute; top: 5px; left: 10px; width: 40px; height: 40px;
}
.head {
  width: 30px; height: 35px; background: var(--skin-tone);
  border: 3px solid var(--outline); border-radius: 10px; position: relative;
}
.eye { width: 10px; height: 10px; background: #fff; border: 2px solid #000; border-radius: 50%; position: absolute; top: 8px; }
.eye.l { left: 4px; } .eye.r { right: 4px; }
.eye::after { content: ''; position: absolute; width: 3px; height: 3px; background: #000; border-radius: 50%; top: 2px; left: 2px; }

/* ARMS AND GUNS */
.arm {
  position: absolute; top: -5px; left: 80px; 
  width: 35px; height: 14px; background: var(--skin-tone);
  border: 3px solid var(--outline); border-radius: 7px;
  z-index: 10; transform: rotate(-5deg);
}
.gun {
  position: absolute; top: -4px; left: 25px;
  width: 25px; height: 14px; background: #333;
  border: 3px solid var(--outline); border-radius: 2px;
}
.gun::after {
  content: ''; position: absolute;
  top: 10px; left: 5px; width: 8px; height: 12px;
  background: #333; border: 3px solid var(--outline); border-top: none;
}

/* MUZZLE FLASH */
.muzzle-flash {
  position: absolute; width: 40px; height: 40px; background: var(--yellow);
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  border: 2px solid var(--outline); opacity: 0; z-index: 100;
  top: -20px; left: 135px;
}

/* UI */
.ebk-logo {
  position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
  font-family: 'Permanent Marker', cursive; font-size: 5rem; color: var(--yellow);
  -webkit-text-stroke: 3px var(--outline); text-shadow: 8px 8px 0 var(--orange);
  z-index: 100; letter-spacing: 10px; transition: transform 0.1s;
}

/* SCANLINES */
#insta-frame::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 3px);
  pointer-events: none; z-index: 200;
}
</style>
</head>
<body onclick="startAudio()">

<div id="insta-frame">
  <div class="sky"><div class="cloud c1"></div></div>
  
  <div class="ebk-logo" id="logo">EBK</div>

  <div class="buildings-container">
    <div class="building moes"><div class="moes-sign">LEEKY'S<br>TAVERN</div></div>
    <div class="building donuts"><div class="donuts-sign"></div></div>
    <div class="building moes"><div class="moes-sign">LEEKY'S<br>TAVERN</div></div>
    <div class="building donuts"><div class="donuts-sign"></div></div>
  </div>

  <div class="road"><div class="road-lines"></div></div>

  <!-- Left Car (Artist) -->
  <div class="car purple">
    <div class="window">
      <div class="character">
        <div class="head">
          <div class="eye l"></div>
          <div class="eye r"></div>
        </div>
      </div>
    </div>
    <div class="arm"><div class="gun"></div></div>
    <div id="flash-left" class="muzzle-flash"></div>
  </div>

  <!-- Right Car (Enemy) -->
  <div class="car green">
    <div class="window">
      <div class="character">
        <div class="head">
          <div class="eye l"></div>
          <div class="eye r"></div>
        </div>
      </div>
    </div>
    <div class="arm"><div class="gun"></div></div>
    <div id="flash-right" class="muzzle-flash"></div>
  </div>
</div>

<script>
  let audioCtx, analyser, source, audioBuffer, isPlaying = false, animFrame;
  const frame = document.getElementById('insta-frame');
  const logo = document.getElementById('logo');
  const fLeft = document.getElementById('flash-left');
  const fRight = document.getElementById('flash-right');

  async function init() {
    try {
      const res = await fetch('ebk.m4a');
      const buf = await res.arrayBuffer();
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioBuffer = await audioCtx.decodeAudioData(buf);
      startAudio();
    } catch (e) { console.log("Init error"); }
  }

  function startAudio() {
    if (isPlaying || !audioBuffer) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    source.start();
    isPlaying = true;
    animate();
  }

  const data = new Uint8Array(32);
  let lastShoot = 0;

  function animate() {
    animFrame = requestAnimationFrame(animate);
    analyser.getByteFrequencyData(data);
    
    let bass = 0;
    for (let i = 0; i < 4; i++) bass += data[i];
    const bassLevel = bass / (4 * 255);

    // Pulse Logo
    logo.style.transform = `translateX(-50%) scale(${1 + bassLevel * 0.3})`;

    // Trigger Shoot & Shake
    if (bassLevel > 0.8 && Date.now() - lastShoot > 120) {
        triggerAction();
        lastShoot = Date.now();
    }
  }

  function triggerAction() {
    // Screen Shake
    frame.classList.remove('shake');
    void frame.offsetWidth; // Force reflow
    frame.classList.add('shake');

    // Random Muzzle Flash
    const flash = Math.random() > 0.5 ? fLeft : fRight;
    flash.style.opacity = '1';
    flash.style.transform = `scale(${1.2 + Math.random()})`;
    setTimeout(() => { flash.style.opacity = '0'; }, 50);
  }

  window.addEventListener('load', init);
</script>

</body>
</html>
